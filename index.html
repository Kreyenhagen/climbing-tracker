<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Send It">
<title>Send It — Climbing Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f5f0;
    --surface: #ffffff;
    --surface2: #eaece5;
    --border: rgba(0,0,0,0.09);
    --accent: #5a9e0f;
    --accent-dim: rgba(90,158,15,0.1);
    --accent-text: #ffffff;
    --text: #1a1c17;
    --muted: #7a8070;
    --danger: #d63c22;
    --r: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    min-height: 100dvh;
    padding-bottom: 80px;
  }

  /* NAV */
  nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.04em;
    padding: 4px 0; transition: color 0.15s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  /* PAGES */
  .page { display: none; padding: 0 16px; }
  .page.active { display: block; }

  /* HEADER */
  .page-header {
    padding: 56px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .page-header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px; letter-spacing: 0.04em;
    color: var(--text); line-height: 1;
  }
  .page-header p { color: var(--muted); font-size: 13px; margin-top: 4px; }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em;
    color: var(--muted); text-transform: uppercase;
    margin-bottom: 8px;
  }
  .card-sub { font-size: 12px; color: var(--muted); }

  /* BENCHMARK */
  .bench-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .bench-row:last-child { border-bottom: none; }
  .bench-icon {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--accent-dim); display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; font-size: 16px;
  }
  .bench-info { flex: 1; min-width: 0; }
  .bench-name { font-size: 13px; font-weight: 500; }
  .bench-val {
    font-family: 'DM Mono', monospace;
    font-size: 12px; color: var(--accent);
    margin-top: 2px;
  }
  .bench-val.empty { color: var(--muted); }
  .btn-log {
    background: var(--accent-dim); border: 1px solid rgba(90,158,15,0.2);
    color: var(--accent); border-radius: 6px; padding: 6px 12px;
    font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer;
    white-space: nowrap; transition: background 0.15s;
  }
  .btn-log:active { background: rgba(90,158,15,0.25); }

  /* SESSION */
  .session-type {
    display: flex; gap: 8px; margin-bottom: 16px;
  }
  .type-btn {
    flex: 1; padding: 10px 4px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--r); color: var(--muted); cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 11px; text-align: center;
    transition: all 0.15s;
  }
  .type-btn.active {
    background: var(--accent-dim); border-color: rgba(90,158,15,0.35);
    color: var(--accent);
  }
  .input-row { margin-bottom: 12px; }
  .input-row label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-family: 'DM Mono', monospace; }
  .input-row input, .input-row textarea, .input-row select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--r); color: var(--text); padding: 10px 12px;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    outline: none; -webkit-appearance: none;
  }
  .input-row input:focus, .input-row textarea:focus { border-color: rgba(90,158,15,0.35); }
  .input-row textarea { resize: none; height: 80px; }
  .btn-primary {
    width: 100%; padding: 14px;
    background: var(--accent); border: none; border-radius: var(--r);
    color: var(--accent-text); font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 0.08em; cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-primary:active { opacity: 0.85; }
  .btn-secondary {
    width: 100%; padding: 12px;
    background: transparent; border: 1px solid var(--border); border-radius: var(--r);
    color: var(--muted); font-family: 'DM Mono', monospace;
    font-size: 12px; cursor: pointer; margin-top: 8px;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-secondary:active { color: var(--text); border-color: var(--muted); }

  /* PROGRESS */
  .stat-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    margin-bottom: 10px;
  }
  .stat-grid-3 {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 14px 12px;
  }
  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px; color: var(--accent); line-height: 1;
  }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 3px; font-family: 'DM Mono', monospace; }

  /* LOG LIST */
  .log-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .log-item:last-child { border-bottom: none; }
  .log-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); margin-top: 5px; flex-shrink: 0;
  }
  .log-dot.day-b { background: #4ab4f0; }
  .log-dot.day-c { background: #f0b44a; }
  .log-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  .log-type { font-size: 13px; font-weight: 500; }
  .log-note { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px 16px 0 0; padding: 20px 20px max(20px, env(safe-area-inset-bottom));
    width: 100%; max-width: 480px; max-height: 85dvh; overflow-y: auto;
  }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; letter-spacing: 0.05em; margin-bottom: 16px;
  }
  .modal-close {
    float: right; background: var(--surface2); border: none;
    color: var(--muted); width: 28px; height: 28px;
    border-radius: 50%; font-size: 16px; cursor: pointer; line-height: 28px;
    text-align: center;
  }

  .empty-state {
    text-align: center; padding: 48px 20px;
    color: var(--muted); font-size: 13px; line-height: 1.7;
  }
  .empty-state .big { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--surface2); margin-bottom: 8px; }

  /* EXERCISE INPUTS */
  .exercise-section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 0.05em;
    color: var(--accent); margin-bottom: 12px;
  }
  .exercise-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .exercise-name {
    font-size: 13px; font-weight: 500; color: var(--text);
    margin-bottom: 10px; line-height: 1.4;
  }
  .ex-input-pair {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .ex-input-pair label,
  .ex-single label {
    display: block; font-size: 11px; color: var(--muted);
    font-family: 'DM Mono', monospace; margin-bottom: 4px;
  }
  .ex-num-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); padding: 8px 10px;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    outline: none; -webkit-appearance: none;
  }
  .ex-num-input:focus { border-color: rgba(90,158,15,0.35); }
  .ex-select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); padding: 8px 10px;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    outline: none; -webkit-appearance: none;
  }
  .ex-select:focus { border-color: rgba(90,158,15,0.35); }

  /* Campus L/R grid */
  .campus-grid {
    display: grid;
    grid-template-columns: 52px 1fr 1fr;
    gap: 6px; align-items: center;
  }
  .campus-grid-header {
    display: contents;
  }
  .campus-grid-header span {
    font-size: 10px; color: var(--muted);
    font-family: 'DM Mono', monospace; text-align: center;
  }
  .campus-grid-header span:first-child { text-align: left; }
  .campus-row { display: contents; }
  .campus-row-label {
    font-size: 11px; color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .campus-num { padding: 6px 4px; text-align: center; }

  /* Pyramid */
  .pyramid-grid {
    display: grid; grid-template-columns: auto 1fr; gap: 8px 12px;
    align-items: center;
  }
  .pyramid-color {
    font-size: 12px; font-family: 'DM Mono', monospace;
    display: flex; align-items: center; gap: 6px;
  }
  .color-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }

  /* BENCHMARK CHART */
  .bench-tabs {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px;
  }
  .bench-tab {
    padding: 5px 10px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; color: var(--muted); cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.04em;
    white-space: nowrap; transition: all 0.15s;
  }
  .bench-tab.active {
    background: var(--accent-dim); border-color: rgba(90,158,15,0.35);
    color: var(--accent);
  }
  #bench-chart { width: 100%; display: block; }
  .chart-empty {
    text-align: center; padding: 36px 0;
    color: var(--muted); font-size: 12px; font-family: 'DM Mono', monospace;
  }
</style>
</head>
<body>

<!-- PAGE: BENCHMARKS -->
<div class="page active" id="page-bench">
  <div class="page-header">
    <h1>Benchmarks</h1>
    <p>Log tests to track your baseline progress</p>
  </div>
  <div class="card">
    <div id="bench-list"></div>
  </div>
</div>

<!-- PAGE: LOG SESSION -->
<div class="page" id="page-log">
  <div class="page-header">
    <h1>Log Session</h1>
    <p>Record today's training</p>
  </div>
  <div class="session-type">
    <button class="type-btn active" data-day="A" onclick="selectDay(this)">Day A<br>Strength</button>
    <button class="type-btn" data-day="B" onclick="selectDay(this)">Day B<br>Power</button>
    <button class="type-btn" data-day="C" onclick="selectDay(this)">Day C<br>Volume</button>
  </div>
  <div class="input-row">
    <label>Date</label>
    <input type="date" id="session-date">
  </div>
  <div id="exercise-inputs"></div>
  <div class="input-row">
    <label>Notes / key wins / what was hard</label>
    <textarea id="session-notes" placeholder="e.g. Felt strong on the campus board. Fingers held up well."></textarea>
  </div>
  <button class="btn-primary" onclick="saveSession()">SAVE SESSION</button>
</div>

<!-- PAGE: PROGRESS -->
<div class="page" id="page-progress">
  <div class="page-header">
    <h1>Progress</h1>
    <p>Your training journey</p>
  </div>
  <div class="stat-grid" id="stat-grid"></div>
  <div class="stat-grid-3" id="stat-grid-days"></div>
  <div class="card">
    <div class="card-label">Benchmark progression</div>
    <div class="bench-tabs" id="bench-tabs"></div>
    <canvas id="bench-chart" height="200"></canvas>
    <div id="bench-chart-empty" class="chart-empty" style="display:none">No entries logged yet for this benchmark.</div>
  </div>
  <div class="card">
    <div class="card-label">Exercise progression</div>
    <div class="bench-tabs" id="ex-tabs"></div>
    <canvas id="ex-chart" height="200"></canvas>
    <div id="ex-chart-empty" class="chart-empty" style="display:none">No data logged yet for this exercise.</div>
  </div>
  <div class="card">
    <div class="card-label">Recent sessions</div>
    <div id="log-list"></div>
  </div>
  <button class="btn-secondary" onclick="exportCSV()">↓ Export all data as CSV</button>
</div>

<!-- NAV -->
<nav>
  <button class="nav-btn active" onclick="showPage('bench', this)">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Tests
  </button>
  <button class="nav-btn" onclick="showPage('log', this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Log
  </button>
  <button class="nav-btn" onclick="showPage('progress', this)">
    <svg viewBox="0 0 24 24"><polyline points="3 17 9 11 13 15 21 7"/><polyline points="14 7 21 7 21 14"/></svg>
    Progress
  </button>
</nav>

<!-- MODAL: Log a benchmark -->
<div class="modal-overlay" id="bench-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title">Log Test</div>
    <div class="input-row">
      <label>Date</label>
      <input type="date" id="modal-date">
    </div>
    <div class="input-row">
      <label id="modal-unit-label">Result</label>
      <input type="number" id="modal-value" inputmode="decimal" placeholder="0">
    </div>
    <div class="input-row" id="modal-value2-row" style="display:none">
      <label id="modal-unit-label2">2nd value</label>
      <input type="number" id="modal-value2" inputmode="decimal" placeholder="0">
    </div>
    <div class="input-row">
      <label>Notes (optional)</label>
      <input type="text" id="modal-notes" placeholder="Conditions, how it felt...">
    </div>
    <button class="btn-primary" onclick="saveBenchmark()">SAVE</button>
  </div>
</div>

<script>
// ── BENCHMARKS ────────────────────────────────────────────────────────────
const BENCHMARKS = [
  { id: 'hang20mm',   icon: '⏱', name: '20mm max hang',        unit: 'seconds',   target: '30s → 45s' },
  { id: 'minEdge',    icon: '📏', name: 'Min edge (10s hang)',   unit: 'mm',        target: '20mm → 15mm' },
  { id: 'weightedPU', icon: '🏋️', name: 'Max weighted pull-up', unit: 'lbs added', target: 'baseline +20–30 lbs' },
  { id: 'campus',     icon: '🤜', name: 'Campus skip level',     unit: 'rung #',    target: '1→4 now, 1→6', dual: true, dualLabels: ['1st skip (rung)', '2nd skip (rung)'] },
  { id: 'lockoff',    icon: '💪', name: 'One-arm lock-off',      unit: 'seconds',   target: '5s → 12s each arm' },
  { id: 'blackFlash', icon: '🪨', name: 'Black flash rate',      unit: '% flashed', target: '10% → 50%' },
];

// ── EXERCISES ─────────────────────────────────────────────────────────────
// types: 'grade' | 'campus-lr' | 'weight' | 'pyramid' | 'attempted-flashed'
const EXERCISES = {
  A: {
    title: 'Strength',
    exercises: [
      { id: 'board_grade',   tab: 'Board',      name: 'Board climbing (projecting)',           type: 'grade' },
      { id: 'campus_ladder', tab: 'Campus',     name: 'Campus laddering — 4×4',                type: 'campus-lr' },
      { id: 'lockoff',       tab: 'Lock-off',   name: '90° max lock-off holds — 7 sec ×5',    type: 'weight' },
      { id: 'weighted_pu',   tab: 'Pull-ups',   name: 'Weighted pull-ups — 3×5',              type: 'weight' },
      { id: 'half_crimp',    tab: 'Crimp Hang', name: '20mm half crimp max hangs — 7 sec ×5', type: 'weight' },
    ]
  },
  B: {
    title: 'Power Endurance',
    exercises: [
      { id: 'pyramid',       tab: 'Pyramid',    name: 'Pyramid bouldering',                    type: 'pyramid' },
      { id: 'finger_curls',  tab: 'Fin. Curls', name: 'Light finger curls — 3×8',             type: 'weight' },
      { id: 'one_arm_hang',  tab: '1-arm Hang', name: 'One arm hang — 7×3 sec 4×3',           type: 'weight' },
      { id: 'pocket_hang',   tab: 'Pocket',     name: '2 finger pocket — 7×3 sec 4×3',        type: 'weight' },
      { id: 'crimp_hang',    tab: 'Crimp',      name: 'Half crimp — 7×3 sec 4×3',             type: 'weight' },
    ]
  },
  C: {
    title: 'Volume',
    exercises: [
      { id: 'circuit_flash', tab: 'Circuit',    name: 'Circuit flashing',                      type: 'attempted-flashed' },
      { id: 'tricep_dips',   tab: 'Tri. Dips',  name: 'Tricep dips — 3×8',                    type: 'weight' },
      { id: 'db_bench',      tab: 'DB Bench',   name: 'DB bench press — 3×8',                 type: 'weight' },
      { id: 'face_pulls',    tab: 'Face Pulls', name: 'Face pulls — 3×8',                     type: 'weight' },
      { id: 'rear_delt',     tab: 'Rear Delt',  name: 'Rear delt cable fly — 3×8',            type: 'weight' },
      { id: 'cable_chest',   tab: 'Cable Fly',  name: 'Cable chest fly — 3×8',                type: 'weight' },
    ]
  },
};

const V_GRADES = ['V0','V1','V2','V3','V4','V5','V6','V7','V8','V9','V10','V11','V12','V13','V14','V15','V16','V17'];
const PYRAMID_COLORS = [
  { id: 'purple', label: 'Purple', dot: '#a855f7' },
  { id: 'orange', label: 'Orange', dot: '#f97316' },
  { id: 'black',  label: 'Black',  dot: '#1a1c17' },
  { id: 'blue',   label: 'Blue',   dot: '#3b82f6' },
];

// ── STORAGE ───────────────────────────────────────────────────────────────
function load(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key)) ?? fallback; } catch { return fallback; }
}
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

let sessions   = load('sessions', []);
let benchLogs  = load('benchLogs', {});
let currentDay = 'A';
let modalBench = null;

// ── PAGES ─────────────────────────────────────────────────────────────────
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'bench')    renderBenchmarks();
  if (id === 'progress') renderProgress();
}

// ── BENCHMARKS ───────────────────────────────────────────────────────────
function renderBenchmarks() {
  document.getElementById('bench-list').innerHTML = BENCHMARKS.map(b => {
    const entries = benchLogs[b.id] || [];
    const latest  = entries[entries.length - 1];
    let valText;
    if (!latest) {
      valText = 'No entries yet';
    } else if (b.dual && latest.value2 != null) {
      valText = `1→${latest.value}→${latest.value2} — ${latest.date}`;
    } else {
      valText = `${latest.value} ${b.unit} — ${latest.date}`;
    }
    return `
      <div class="bench-row">
        <div class="bench-icon">${b.icon}</div>
        <div class="bench-info">
          <div class="bench-name">${b.name}</div>
          <div class="bench-val ${latest ? '' : 'empty'}">${valText}</div>
          <div class="card-sub" style="font-size:11px;margin-top:2px;">${b.target}</div>
        </div>
        <button class="btn-log" onclick="openModal('${b.id}')">Log</button>
      </div>`;
  }).join('');
}

function openModal(benchId) {
  modalBench = BENCHMARKS.find(b => b.id === benchId);
  document.getElementById('modal-title').textContent = 'Log: ' + modalBench.name;
  document.getElementById('modal-date').value = today();
  document.getElementById('modal-value').value = '';
  document.getElementById('modal-value2').value = '';
  document.getElementById('modal-notes').value = '';
  const v2row = document.getElementById('modal-value2-row');
  if (modalBench.dual) {
    document.getElementById('modal-unit-label').textContent  = modalBench.dualLabels[0];
    document.getElementById('modal-unit-label2').textContent = modalBench.dualLabels[1];
    v2row.style.display = 'block';
  } else {
    document.getElementById('modal-unit-label').textContent = `Result (${modalBench.unit})`;
    v2row.style.display = 'none';
  }
  document.getElementById('bench-modal').classList.add('open');
}
function closeModal() {
  document.getElementById('bench-modal').classList.remove('open');
  modalBench = null;
}
function saveBenchmark() {
  if (!modalBench) return;
  const val = parseFloat(document.getElementById('modal-value').value);
  if (isNaN(val)) return alert('Enter a value.');
  const entry = {
    date:  document.getElementById('modal-date').value,
    value: val,
    notes: document.getElementById('modal-notes').value,
  };
  if (modalBench.dual) {
    const val2 = parseFloat(document.getElementById('modal-value2').value);
    if (isNaN(val2)) return alert('Enter both values.');
    entry.value2 = val2;
  }
  if (!benchLogs[modalBench.id]) benchLogs[modalBench.id] = [];
  benchLogs[modalBench.id].push(entry);
  save('benchLogs', benchLogs);
  closeModal();
  renderBenchmarks();
}

// ── EXERCISE RENDERING ────────────────────────────────────────────────────
function renderExercises() {
  const plan = EXERCISES[currentDay];
  const container = document.getElementById('exercise-inputs');
  if (!plan) { container.innerHTML = ''; return; }

  let html = `<div class="exercise-section-title">${plan.title}</div>`;

  plan.exercises.forEach(ex => {
    html += `<div class="exercise-block">`;
    html += `<div class="exercise-name">${ex.name}</div>`;

    if (ex.type === 'grade') {
      html += `<div class="ex-single">
        <label>Max grade sent</label>
        <select id="ex_${ex.id}_grade" class="ex-select">
          <option value="">— select —</option>
          ${V_GRADES.map(g => `<option>${g}</option>`).join('')}
        </select>
      </div>`;

    } else if (ex.type === 'weight') {
      html += `<div class="ex-single">
        <label>Weight (lbs)</label>
        <input type="number" id="ex_${ex.id}_weight" inputmode="decimal" placeholder="0" class="ex-num-input">
      </div>`;

    } else if (ex.type === 'campus-lr') {
      html += `<div class="campus-grid">
        <div class="campus-grid-header">
          <span></span><span>Set L</span><span>Set R</span>
        </div>`;
      ['2','3'].forEach(step => {
        html += `<div class="campus-row">
          <span class="campus-row-label">Step ${step}</span>
          <input type="number" id="ex_${ex.id}_l${step}_L" inputmode="numeric" placeholder="—" class="ex-num-input campus-num">
          <input type="number" id="ex_${ex.id}_l${step}_R" inputmode="numeric" placeholder="—" class="ex-num-input campus-num">
        </div>`;
      });
      html += `</div>`;

    } else if (ex.type === 'pyramid') {
      html += `<div class="pyramid-grid">`;
      PYRAMID_COLORS.forEach(c => {
        html += `
          <div class="pyramid-color">
            <div class="color-dot" style="background:${c.dot}"></div>
            ${c.label}
          </div>
          <input type="number" id="ex_${ex.id}_${c.id}" inputmode="numeric" placeholder="0" class="ex-num-input">`;
      });
      html += `</div>`;

    } else if (ex.type === 'attempted-flashed') {
      html += `<div class="ex-input-pair">
        <div><label>Attempted</label><input type="number" id="ex_${ex.id}_attempted" inputmode="numeric" placeholder="0" class="ex-num-input"></div>
        <div><label>Flashed</label><input type="number" id="ex_${ex.id}_flashed" inputmode="numeric" placeholder="0" class="ex-num-input"></div>
      </div>`;
    }

    html += `</div>`;
  });

  container.innerHTML = html;
}

function collectExerciseData() {
  const plan = EXERCISES[currentDay];
  if (!plan) return {};
  const data = {};
  plan.exercises.forEach(ex => {
    if (ex.type === 'grade') {
      data[ex.id] = { grade: document.getElementById(`ex_${ex.id}_grade`)?.value || '' };
    } else if (ex.type === 'weight') {
      data[ex.id] = { weight: document.getElementById(`ex_${ex.id}_weight`)?.value || '' };
    } else if (ex.type === 'campus-lr') {
      const d = {};
      ['2','3'].forEach(step => {
        d[step] = {
          L: document.getElementById(`ex_${ex.id}_l${step}_L`)?.value || '',
          R: document.getElementById(`ex_${ex.id}_l${step}_R`)?.value || '',
        };
      });
      data[ex.id] = d;
    } else if (ex.type === 'pyramid') {
      const d = {};
      PYRAMID_COLORS.forEach(c => {
        d[c.id] = document.getElementById(`ex_${ex.id}_${c.id}`)?.value || '';
      });
      data[ex.id] = d;
    } else if (ex.type === 'attempted-flashed') {
      data[ex.id] = {
        attempted: document.getElementById(`ex_${ex.id}_attempted`)?.value || '',
        flashed:   document.getElementById(`ex_${ex.id}_flashed`)?.value || '',
      };
    }
  });
  return data;
}

// ── BENCHMARK CHART ───────────────────────────────────────────────────────
const BENCH_SHORT = {
  hang20mm: '20mm Hang', minEdge: 'Min Edge', weightedPU: 'Wtd Pull-up',
  campus: 'Campus', lockoff: 'Lock-off', blackFlash: 'Flash Rate',
};

function renderBenchChart() {
  document.getElementById('bench-tabs').innerHTML = BENCHMARKS.map(b => `
    <button class="bench-tab${b.id === currentBenchTab ? ' active' : ''}"
      onclick="selectBenchTab('${b.id}')">${BENCH_SHORT[b.id] || b.name}</button>
  `).join('');
  drawBenchChart(currentBenchTab);
}

function selectBenchTab(id) {

  renderBenchChart();
}

function drawBenchChart(benchId) {
  const bench   = BENCHMARKS.find(b => b.id === benchId);
  const entries = (benchLogs[benchId] || []).slice().sort((a, b) => a.date.localeCompare(b.date));
  const canvas  = document.getElementById('bench-chart');
  const emptyEl = document.getElementById('bench-chart-empty');

  if (!entries.length) {
    canvas.style.display = 'none';
    emptyEl.style.display = 'block';
    return;
  }
  canvas.style.display = 'block';
  emptyEl.style.display = 'none';

  const isDual = bench.dual && entries.some(e => e.value2 != null);

  const dpr  = window.devicePixelRatio || 1;
  const cssW = canvas.parentElement.clientWidth - 32;
  // Extra height when we need a legend
  const cssH = isDual ? 224 : 200;
  canvas.style.width  = cssW + 'px';
  canvas.style.height = cssH + 'px';
  canvas.width  = cssW * dpr;
  canvas.height = cssH * dpr;

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const LEGEND_H = isDual ? 24 : 0;
  const PAD = { top: 24, right: 16, bottom: 44, left: 48 };
  const W   = cssW - PAD.left - PAD.right;
  const H   = cssH - PAD.top  - PAD.bottom - LEGEND_H;

  // Gather all values for unified axis
  const allVals = entries.flatMap(e => isDual && e.value2 != null ? [e.value, e.value2] : [e.value]);
  const rawMin  = Math.min(...allVals);
  const rawMax  = Math.max(...allVals);
  const spread  = rawMax - rawMin || rawMax * 0.2 || 1;
  const minVal  = Math.max(0, rawMin - spread * 0.15);
  const maxVal  = rawMax + spread * 0.15;
  const valRange = maxVal - minVal;

  const xPos = i => PAD.left + (entries.length === 1 ? W / 2 : (i / (entries.length - 1)) * W);
  const yPos = v => PAD.top + LEGEND_H + H - ((v - minVal) / valRange) * H;

  const COLOR1    = '#5a9e0f';           // accent green — 1st skip / single series
  const COLOR2    = '#1a7aaa';           // blue — 2nd skip
  const mutedCol  = '#7a8070';
  const gridColor = 'rgba(0,0,0,0.06)';

  ctx.clearRect(0, 0, cssW, cssH);

  // Legend (dual only)
  if (isDual) {
    const labels = bench.dualLabels;
    ctx.font = '10px DM Mono, monospace';
    ctx.textAlign = 'left';
    [[COLOR1, labels[0]], [COLOR2, labels[1]]].forEach(([col, label], idx) => {
      const lx = PAD.left + idx * 120;
      ctx.fillStyle = col;
      ctx.beginPath(); ctx.arc(lx + 5, 12, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = mutedCol;
      ctx.fillText(label, lx + 14, 16);
    });
  }

  // Y gridlines + labels
  const STEPS = 4;
  ctx.font = '10px DM Mono, monospace';
  ctx.textAlign = 'right';
  for (let i = 0; i <= STEPS; i++) {
    const v = minVal + (valRange / STEPS) * i;
    const y = yPos(v);
    ctx.strokeStyle = gridColor; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left + W, y); ctx.stroke();
    ctx.fillStyle = mutedCol;
    ctx.fillText(Math.round(v * 10) / 10, PAD.left - 6, y + 3);
  }

  // Y axis unit label
  ctx.save();
  ctx.translate(11, PAD.top + LEGEND_H + H / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textAlign = 'center';
  ctx.font = '9px DM Mono, monospace';
  ctx.fillStyle = mutedCol;
  ctx.fillText(bench.unit, 0, 0);
  ctx.restore();

  // Draw one series: fill + line + dots
  function drawSeries(valueKey, color, fillColor) {
    const pts = entries.map((e, i) => ({ x: xPos(i), y: yPos(e[valueKey]), v: e[valueKey] }))
                       .filter(p => p.v != null);
    if (!pts.length) return;

    // Area fill
    ctx.beginPath();
    pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.lineTo(pts[pts.length - 1].x, PAD.top + LEGEND_H + H);
    ctx.lineTo(pts[0].x, PAD.top + LEGEND_H + H);
    ctx.closePath();
    ctx.fillStyle = fillColor;
    ctx.fill();

    // Line
    ctx.beginPath();
    ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.lineJoin = 'round';
    pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.stroke();

    // Dots + value labels
    ctx.font = '9px DM Mono, monospace';
    ctx.textAlign = 'center';
    const showAll = pts.length <= 6;
    pts.forEach((p, i) => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
      ctx.fillStyle = color; ctx.fill();
      if (showAll || i === 0 || i === pts.length - 1) {
        ctx.fillStyle = color;
        ctx.fillText(p.v, p.x, p.y - 9);
      }
    });
  }

  drawSeries('value',  COLOR1, isDual ? 'rgba(90,158,15,0.08)' : 'rgba(90,158,15,0.1)');
  if (isDual) drawSeries('value2', COLOR2, 'rgba(26,122,170,0.08)');

  // Date labels (shared x axis, drawn once from first series)
  ctx.font = '9px DM Mono, monospace';
  ctx.textAlign = 'center';
  entries.forEach((e, i) => {
    const d = new Date(e.date + 'T12:00:00');
    const label = d.toLocaleString('default', { month: 'short' }) + ' ' + d.getDate();
    ctx.fillStyle = mutedCol;
    ctx.fillText(label, xPos(i), PAD.top + LEGEND_H + H + 16);
  });
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function drawExerciseChart(day, exId) {
  const ex      = EXERCISES[day].exercises.find(e => e.id === exId);
  const canvas  = document.getElementById('ex-chart');
  const emptyEl = document.getElementById('ex-chart-empty');

  const relevantSessions = sessions
    .filter(s => s.day === day && s.exercises && s.exercises[exId])
    .slice().sort((a, b) => a.date.localeCompare(b.date));

  if (!relevantSessions.length) {
    canvas.style.display = 'none';
    emptyEl.style.display = 'block';
    return;
  }

  // Build series
  let series = [];

  if (ex.type === 'weight') {
    series = [{ label: 'Weight (lbs)', color: '#5a9e0f', points:
      relevantSessions.map(s => { const v = parseFloat(s.exercises[exId].weight); return isNaN(v) ? null : { date: s.date, value: v }; }).filter(Boolean)
    }];

  } else if (ex.type === 'grade') {
    series = [{ label: 'Max grade', color: '#5a9e0f', isGrade: true, points:
      relevantSessions.map(s => { const g = s.exercises[exId].grade; const idx = V_GRADES.indexOf(g); return idx < 0 ? null : { date: s.date, value: idx, vLabel: g }; }).filter(Boolean)
    }];

  } else if (ex.type === 'attempted-flashed') {
    series = [
      { label: 'Attempted', color: '#5a9e0f', points: relevantSessions.map(s => { const v = parseFloat(s.exercises[exId].attempted); return isNaN(v) ? null : { date: s.date, value: v }; }).filter(Boolean) },
      { label: 'Flashed',   color: '#4ab4f0', points: relevantSessions.map(s => { const v = parseFloat(s.exercises[exId].flashed);   return isNaN(v) ? null : { date: s.date, value: v }; }).filter(Boolean) },
    ];

  } else if (ex.type === 'pyramid') {
    const pCols = [
      { id: 'purple', label: 'Purple', color: '#a855f7' },
      { id: 'orange', label: 'Orange', color: '#f97316' },
      { id: 'black',  label: 'Black',  color: '#1a1c17' },
      { id: 'blue',   label: 'Blue',   color: '#3b82f6' },
    ];
    series = pCols.map(pc => ({ label: pc.label, color: pc.color, points:
      relevantSessions.map(s => { const v = parseFloat(s.exercises[exId][pc.id]); return isNaN(v) ? null : { date: s.date, value: v }; }).filter(Boolean)
    })).filter(s => s.points.length);

  } else if (ex.type === 'campus-lr') {
    const stepDefs = [
      { step: '2', labelL: 'S2 L', colorL: '#4ab4f0', labelR: 'S2 R', colorR: '#1a7aaa' },
      { step: '3', labelL: 'S3 L', colorL: '#f0b44a', labelR: 'S3 R', colorR: '#b07010' },
    ];
    stepDefs.forEach(sd => {
      ['L','R'].forEach(hand => {
        const pts = relevantSessions.map(s => { const v = parseFloat(s.exercises[exId]?.[sd.step]?.[hand]); return isNaN(v) ? null : { date: s.date, value: v }; }).filter(Boolean);
        if (pts.length) series.push({ label: hand === 'L' ? sd.labelL : sd.labelR, color: hand === 'L' ? sd.colorL : sd.colorR, points: pts });
      });
    });
  }

  series = series.filter(s => s.points.length);
  if (!series.length) {
    canvas.style.display = 'none';
    emptyEl.style.display = 'block';
    return;
  }
  canvas.style.display = 'block';
  emptyEl.style.display = 'none';

  const isGrade   = series[0]?.isGrade;
  const hasLegend = series.length > 1;
  const legendRows = hasLegend ? Math.ceil(series.length / 3) : 0;
  const LEGEND_H   = legendRows * 18 + (legendRows > 0 ? 4 : 0);

  const dpr  = window.devicePixelRatio || 1;
  const cssW = canvas.parentElement.clientWidth - 32;
  const cssH = 200 + LEGEND_H;
  canvas.style.width  = cssW + 'px';
  canvas.style.height = cssH + 'px';
  canvas.width  = cssW * dpr;
  canvas.height = cssH * dpr;

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const PAD = { top: 24, right: 16, bottom: 44, left: 48 };
  const W   = cssW - PAD.left - PAD.right;
  const H   = 200 - PAD.top - PAD.bottom;

  const allDates = [...new Set(series.flatMap(s => s.points.map(p => p.date)))].sort();
  const n = allDates.length;
  const dateIndex = Object.fromEntries(allDates.map((d, i) => [d, i]));

  const allVals = series.flatMap(s => s.points.map(p => p.value));
  const rawMin  = Math.min(...allVals);
  const rawMax  = Math.max(...allVals);
  const spread  = rawMax - rawMin || rawMax * 0.2 || 1;
  const minVal  = isGrade ? Math.max(0, rawMin - 1) : Math.max(0, rawMin - spread * 0.15);
  const maxVal  = isGrade ? rawMax + 1 : rawMax + spread * 0.15;
  const valRange = maxVal - minVal;

  const xPos = i => PAD.left + (n === 1 ? W / 2 : (i / (n - 1)) * W);
  const yPos = v => PAD.top + LEGEND_H + H - ((v - minVal) / valRange) * H;

  const mutedCol  = '#7a8070';
  const gridColor = 'rgba(0,0,0,0.06)';

  ctx.clearRect(0, 0, cssW, cssH);

  // Legend
  if (hasLegend) {
    ctx.font = '10px DM Mono, monospace';
    ctx.textAlign = 'left';
    series.forEach((s, idx) => {
      const col = idx % 3;
      const row = Math.floor(idx / 3);
      const lx  = PAD.left + col * Math.floor(W / 3);
      const ly  = 14 + row * 18;
      ctx.fillStyle = s.color;
      ctx.beginPath(); ctx.arc(lx + 5, ly - 4, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = mutedCol;
      ctx.fillText(s.label, lx + 14, ly);
    });
  }

  // Y gridlines + labels
  const STEPS = 4;
  ctx.font = '10px DM Mono, monospace'; ctx.textAlign = 'right';
  for (let i = 0; i <= STEPS; i++) {
    const v = minVal + (valRange / STEPS) * i;
    const y = yPos(v);
    ctx.strokeStyle = gridColor; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left + W, y); ctx.stroke();
    ctx.fillStyle = mutedCol;
    ctx.fillText(isGrade ? (V_GRADES[Math.round(v)] || '') : (Math.round(v * 10) / 10), PAD.left - 6, y + 3);
  }

  // Y axis label
  ctx.save();
  ctx.translate(11, PAD.top + LEGEND_H + H / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textAlign = 'center'; ctx.font = '9px DM Mono, monospace'; ctx.fillStyle = mutedCol;
  ctx.fillText(isGrade ? 'grade' : 'lbs', 0, 0);
  ctx.restore();

  // Draw each series
  series.forEach(s => {
    const pts = s.points
      .map(p => ({ x: xPos(dateIndex[p.date]), y: yPos(p.value), v: p.value, vLabel: p.vLabel || String(p.value) }));
    if (!pts.length) return;

    ctx.beginPath();
    pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.lineTo(pts[pts.length-1].x, PAD.top + LEGEND_H + H);
    ctx.lineTo(pts[0].x, PAD.top + LEGEND_H + H);
    ctx.closePath();
    ctx.fillStyle = hexToRgba(s.color, 0.06); ctx.fill();

    ctx.beginPath();
    ctx.strokeStyle = s.color; ctx.lineWidth = 2; ctx.lineJoin = 'round';
    pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.stroke();

    ctx.font = '9px DM Mono, monospace'; ctx.textAlign = 'center';
    const showAll = pts.length <= 6;
    pts.forEach((p, i) => {
      ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
      ctx.fillStyle = s.color; ctx.fill();
      if (showAll || i === 0 || i === pts.length - 1) {
        ctx.fillStyle = s.color;
        ctx.fillText(p.vLabel, p.x, p.y - 9);
      }
    });
  });

  // Date labels
  ctx.font = '9px DM Mono, monospace'; ctx.textAlign = 'center';
  allDates.forEach((date, i) => {
    const d = new Date(date + 'T12:00:00');
    ctx.fillStyle = mutedCol;
    ctx.fillText(d.toLocaleString('default', { month: 'short' }) + ' ' + d.getDate(), xPos(i), PAD.top + LEGEND_H + H + 16);
  });
}

// ── CSV EXPORT ────────────────────────────────────────────────────────────
function exportCSV() {
  const rows = [['type','date','day','workout','notes']];
  sessions.forEach(s => {
    const plan = EXERCISES[s.day];
    rows.push(['session', s.date, s.day, plan ? plan.title : '', (s.notes || '').replace(/,/g,'')]);
  });
  BENCHMARKS.forEach(b => {
    (benchLogs[b.id] || []).forEach(e => {
      rows.push(['benchmark', e.date, b.name, e.value + ' ' + b.unit, e.notes || '']);
    });
  });
  const csv  = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'climbing-log.csv'; a.click();
  URL.revokeObjectURL(url);
}

// ── UTILS ─────────────────────────────────────────────────────────────────
function today() { return new Date().toISOString().split('T')[0]; }

renderBenchmarks();
renderExercises();
</script>
